<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">

  <title>World Cup 26 — Live Center</title>
  <style>
    :root{--bg:#07111f;--bg2:#101f36;--card:rgba(255,255,255,.12);--card2:rgba(255,255,255,.18);--text:#f7fbff;--muted:rgba(247,251,255,.68);--line:rgba(255,255,255,.18);--accent:#61f2d2;--accent2:#79a8ff;--danger:#ff6b7b;--shadow:0 24px 80px rgba(0,0,0,.35);--radius:28px;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;color-scheme:dark}
    [data-theme="light"]{--bg:#eef5ff;--bg2:#dceaff;--card:rgba(255,255,255,.72);--card2:rgba(255,255,255,.88);--text:#0b1220;--muted:rgba(11,18,32,.62);--line:rgba(10,20,40,.12);--accent:#00a887;--accent2:#315cff;--shadow:0 24px 70px rgba(31,75,140,.16);color-scheme:light}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(97,242,210,.22),transparent 34%),radial-gradient(circle at 88% 0,rgba(121,168,255,.32),transparent 36%),linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text);overflow-x:hidden}.bg-orb{position:fixed;filter:blur(50px);opacity:.5;pointer-events:none}.o1{width:420px;height:420px;border-radius:999px;background:#56ffce;left:-120px;top:70px}.o2{width:520px;height:520px;border-radius:999px;background:#6f7dff;right:-170px;top:140px}.shell{display:grid;grid-template-columns:280px 1fr;gap:22px;max-width:1480px;margin:0 auto;padding:22px}.glass{background:linear-gradient(145deg,var(--card2),var(--card));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(28px) saturate(1.25);-webkit-backdrop-filter:blur(28px) saturate(1.25);border-radius:var(--radius)}.side{position:sticky;top:22px;height:calc(100vh - 44px);padding:18px;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:12px;align-items:center;padding:12px;border-radius:22px;background:rgba(255,255,255,.1)}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:26px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}.brand strong{display:block;font-size:18px}.brand small{color:var(--muted)}.nav{display:grid;gap:9px}.nav button,.theme,.pill,.match,.datechip{border:0;color:var(--text);background:transparent;font:inherit}.nav button{display:flex;gap:10px;align-items:center;width:100%;padding:13px 14px;border-radius:18px;color:var(--muted);cursor:pointer}.nav button.active,.nav button:hover{background:rgba(255,255,255,.14);color:var(--text)}.side-bottom{margin-top:auto;display:grid;gap:10px}.theme{cursor:pointer;text-align:left;padding:14px;border-radius:18px;background:rgba(255,255,255,.12)}.source{font-size:12px;color:var(--muted);padding:0 6px}.main{min-width:0}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:18px;padding:18px 20px}.kicker{color:var(--accent);font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px}.title{font-size:clamp(30px,5vw,66px);line-height:.94;margin:8px 0 10px}.subtitle{max-width:780px;color:var(--muted);font-size:17px;line-height:1.45}.hero{padding:26px;margin-bottom:18px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;inset:auto -60px -120px auto;width:320px;height:320px;border-radius:999px;background:rgba(97,242,210,.18);filter:blur(25px)}.grid{display:grid;gap:18px}.cols{grid-template-columns:1.35fr .85fr}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.stat{padding:18px}.stat b{font-size:30px;display:block}.stat span{color:var(--muted)}.panel{padding:20px}.panel h2{margin:0 0 14px;font-size:22px}.toolbar{display:flex;gap:10px;overflow:auto;padding-bottom:8px}.datechip{white-space:nowrap;padding:10px 13px;border-radius:999px;background:rgba(255,255,255,.1);cursor:pointer;color:var(--muted)}.datechip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06111c;font-weight:800}.match-list{display:grid;gap:12px}.match{width:100%;text-align:left;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:14px;border-radius:22px;background:rgba(255,255,255,.1);border:1px solid var(--line);cursor:pointer}.team{display:flex;align-items:center;gap:10px;min-width:0}.team.away{justify-content:flex-end;text-align:right}.flag{width:34px;height:24px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,.2);box-shadow:0 0 0 1px var(--line)}.fallback-flag{width:34px;height:24px;border-radius:6px;display:grid;place-items:center;background:rgba(255,255,255,.16);font-size:18px}.team-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.scorebox{text-align:center;min-width:94px}.score{font-size:26px;font-weight:900}.meta{font-size:12px;color:var(--muted);margin-top:2px}.live{color:#06111c;background:var(--accent);padding:3px 8px;border-radius:999px;font-size:11px;font-weight:900}.table-wrap{overflow:auto}.standings{width:100%;border-collapse:collapse;min-width:620px}.standings th,.standings td{padding:11px 8px;border-bottom:1px solid var(--line);font-size:14px}.standings th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.leaders{display:grid;gap:10px}.player{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:11px;border-radius:18px;background:rgba(255,255,255,.1)}.avatar{width:46px;height:46px;border-radius:999px;object-fit:cover;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-weight:900;color:#07111f}.player small{display:block;color:var(--muted)}.value{font-size:22px;font-weight:900}.empty{color:var(--muted);padding:28px;text-align:center}.bottom-nav{display:none}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.sheet{width:min(900px,100%);max-height:88vh;overflow:auto;padding:20px;border-radius:30px}.sheet-head{display:flex;justify-content:space-between;gap:12px;align-items:center}.close{border:0;background:rgba(255,255,255,.12);color:var(--text);width:40px;height:40px;border-radius:14px;font-size:22px;cursor:pointer}.tabs{display:flex;gap:8px;margin:16px 0;overflow:auto}.tabs button{border:0;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.1);color:var(--muted);cursor:pointer}.tabs button.active{background:var(--text);color:var(--bg);font-weight:800}.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini-card{padding:14px;border-radius:20px;background:rgba(255,255,255,.09);border:1px solid var(--line)}.err{background:rgba(255,107,123,.14);border:1px solid rgba(255,107,123,.34);padding:12px;border-radius:18px;color:var(--text);margin-top:12px}.loader{display:inline-block;width:12px;height:12px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 0 rgba(97,242,210,.5);animation:pulse 1.2s infinite}@keyframes pulse{to{box-shadow:0 0 0 12px transparent}}@media (max-width:980px){.shell{grid-template-columns:1fr;padding:12px 12px 88px}.side{display:none}.cols{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.top{position:sticky;top:8px;z-index:10}.bottom-nav{display:flex;position:fixed;left:12px;right:12px;bottom:12px;z-index:15;padding:8px;border-radius:26px;justify-content:space-around}.bottom-nav button{border:0;background:transparent;color:var(--muted);font:inherit;padding:10px;border-radius:18px}.bottom-nav button.active{background:rgba(255,255,255,.16);color:var(--text)}.match{grid-template-columns:1fr;}.team.away{justify-content:flex-start;text-align:left}.scorebox{text-align:left}.split{grid-template-columns:1fr}}@media (max-width:560px){.cards{grid-template-columns:1fr}.hero,.panel{padding:16px}.title{font-size:38px}.top{padding:12px}.subtitle{font-size:15px}}
  </style>
</head>
<body>
  <div class="bg-orb o1"></div><div class="bg-orb o2"></div>
  <div class="shell">
    <aside class="side glass">
      <div class="brand"><div class="logo">⚽</div><div><strong>World Cup 26</strong><small>Live Center</small></div></div>
      <nav class="nav" id="sideNav"></nav>
      <div class="side-bottom"><button class="theme" id="themeBtn">◐ Сменить тему</button><div class="source" id="source">Подключение…</div></div>
    </aside>
    <main class="main">
      <header class="top glass"><div><b>FIFA World Cup 2026</b><div class="meta" id="clock"></div></div><button class="theme" id="refreshBtn">Обновить</button></header>
      <section class="hero glass"><div class="kicker">Apple-style unofficial center</div><h1 class="title">ЧМ-2026<br>в реальном времени</h1><p class="subtitle">Расписание, счёт, таблицы, флаги сборных и фотографии игроков через твой Cloudflare Worker API-Football. Безопасно для GitHub Pages: ключ остаётся только в Cloudflare.</p><div id="errorBox"></div></section>
      <section class="cards" id="statsCards"></section>
      <div class="grid cols" style="margin-top:18px">
        <section class="panel glass" id="mainPanel"></section>
        <aside class="panel glass" id="sidePanel"></aside>
      </div>
    </main>
  </div>
  <nav class="bottom-nav glass" id="bottomNav"></nav>
  <div class="modal" id="modal"><div class="sheet glass"><div class="sheet-head"><h2 id="modalTitle">Матч</h2><button class="close" id="closeModal">×</button></div><div id="modalContent"></div></div></div>
<script>
(function(){
'use strict';
const WORKER='https://wc26-live-api.efim26470.workers.dev';
const FLAG_ROOT='https://flagcdn.com/w80';
const STORE_THEME='wc26-clean-theme';
const routes=[['home','Сегодня'],['schedule','Матчи'],['standings','Таблицы'],['stats','Игроки'],['favorites','Избранное']];
const state={route:'home',data:null,loading:true,error:null,selectedDate:null,favs:new Set(JSON.parse(localStorage.getItem('wc26-favs')||'[]')),theme:localStorage.getItem(STORE_THEME)||'dark',activeMatch:null};
const fallback={source:'demo',provider:'Демо-данные',lastUpdated:new Date().toISOString(),matches:[{id:'demo1',date:'2026-06-11T19:00:00Z',group:'Group A',status:'upcoming',home:{name:'Mexico',code:'MEX',flag:'mx'},away:{name:'South Africa',code:'RSA',flag:'za'},score:{home:null,away:null}},{id:'demo2',date:'2026-06-12T01:00:00Z',group:'Group D',status:'upcoming',home:{name:'United States',code:'USA',flag:'us'},away:{name:'Paraguay',code:'PAR',flag:'py'},score:{home:null,away:null}},{id:'demo3',date:'2026-06-13T22:00:00Z',group:'Group C',status:'upcoming',home:{name:'Brazil',code:'BRA',flag:'br'},away:{name:'Morocco',code:'MAR',flag:'ma'},score:{home:null,away:null}}],standings:[],leaders:{goals:[{name:'Kylian Mbappé',team:'France',teamCode:'FRA',photo:'',value:0},{name:'Lionel Messi',team:'Argentina',teamCode:'ARG',photo:'',value:0}],assists:[{name:'Kevin De Bruyne',team:'Belgium',teamCode:'BEL',photo:'',value:0}]}};
const codeMap={ARG:'ar',DZA:'dz',ALG:'dz',AUT:'at',JOR:'jo',GHA:'gh',PAN:'pa',ENG:'gb-eng',CRO:'hr',POR:'pt',COD:'cd',DRC:'cd',UZB:'uz',COL:'co',CZE:'cz',RSA:'za',SUI:'ch',KOR:'kr',USA:'us',AUS:'au',MEX:'mx',CAN:'ca',BIH:'ba',QAT:'qa',BRA:'br',FRA:'fr',GER:'de',DEU:'de',ESP:'es',NOR:'no',MAR:'ma',SEN:'sn',BEL:'be',EGY:'eg',URU:'uy',NZL:'nz',JPN:'jp',TUN:'tn',ECU:'ec',IRI:'ir',IRN:'ir',KSA:'sa',CIV:'ci',CPV:'cv',PAR:'py',SCO:'gb-sct',HTI:'ht',CUW:'cw',TUR:'tr',NED:'nl',SWE:'se',IRQ:'iq'};
const nameMap={'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo','Ghana':'gh','Panama':'pa','England':'gb-eng','Croatia':'hr','Portugal':'pt','DR Congo':'cd','Congo DR':'cd','Uzbekistan':'uz','Colombia':'co','Czechia':'cz','Czech Republic':'cz','South Africa':'za','Switzerland':'ch','South Korea':'kr','Korea Republic':'kr','United States':'us','USA':'us','Australia':'au','Mexico':'mx','Canada':'ca','Bosnia and Herzegovina':'ba','Bosnia & Herzegovina':'ba','Qatar':'qa','Brazil':'br','France':'fr','Germany':'de','Spain':'es','Norway':'no','Morocco':'ma','Senegal':'sn','Belgium':'be','Egypt':'eg','Uruguay':'uy','New Zealand':'nz','Japan':'jp','Tunisia':'tn','Ecuador':'ec','Iran':'ir','Saudi Arabia':'sa','Ivory Coast':'ci','Côte d Ivoire':'ci','Cape Verde':'cv','Paraguay':'py','Scotland':'gb-sct','Haiti':'ht','Curacao':'cw','Curaçao':'cw','Turkey':'tr','Netherlands':'nl','Sweden':'se','Iraq':'iq'};
function $(s,r=document){return r.querySelector(s)} function $$(s,r=document){return Array.from(r.querySelectorAll(s))}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmtDate(iso,opts={}){try{return new Intl.DateTimeFormat('ru-RU',opts).format(new Date(iso))}catch{return '—'}}
function fmtTime(iso){try{return new Intl.DateTimeFormat('ru-RU',{hour:'2-digit',minute:'2-digit'}).format(new Date(iso))}catch{return '—'}}
function flagCode(team){return team?.flag||codeMap[(team?.code||'').toUpperCase()]||nameMap[team?.name]||''}
function flag(team){const c=flagCode(team);return c?`<img class="flag" src="${FLAG_ROOT}/${esc(c)}.png" alt="">`:`<span class="fallback-flag">🏳️</span>`}
function avatar(p){if(p?.photo)return `<img class="avatar" src="${esc(p.photo)}" alt="">`; const initials=(p?.name||'?').split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();return `<div class="avatar">${esc(initials)}</div>`}
function score(m){const h=m?.score?.home, a=m?.score?.away; return h==null||a==null?'–':`${h}:${a}`}
function statusLabel(m){if(m.status==='live')return '<span class="live">LIVE</span>'; if(m.status==='finished')return 'Завершён'; return fmtTime(m.date)}
function groupByDate(matches){return matches.reduce((acc,m)=>{const k=fmtDate(m.date,{day:'2-digit',month:'long',year:'numeric'});(acc[k]||(acc[k]=[])).push(m);return acc},{})}
function normalizeData(raw){const d=raw||fallback; d.matches=(d.matches||[]).map(m=>({id:String(m.id||m.fixtureId||Math.random()),date:m.date||m.kickoff||new Date().toISOString(),group:m.group||m.round||'',status:m.status||'upcoming',home:m.home||m.teams?.home||{},away:m.away||m.teams?.away||{},score:m.score||{home:m.homeScore,away:m.awayScore},events:m.events||[],stats:m.stats||[],lineups:m.lineups||[],h2h:m.h2h||[]})); d.leaders=d.leaders||{}; d.standings=d.standings||[]; return d}
async function clearOldCaches(){try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); for(const r of regs) await r.unregister()} if(window.caches){const keys=await caches.keys(); for(const k of keys) if(k.includes('wc26')||k.includes('worldcup')) await caches.delete(k)}}catch(e){}}
async function load(){state.loading=true; render(); try{const res=await fetch(WORKER+'/api/snapshot',{cache:'no-store'}); if(!res.ok) throw new Error('Worker ответил '+res.status); state.data=normalizeData(await res.json()); state.error=null}catch(e){state.data=normalizeData(fallback); state.error='Live-API временно недоступен, включён демо-режим. Деталь: '+e.message} finally{state.loading=false; render()}}
function setRoute(r){state.route=r; render()} function saveFavs(){localStorage.setItem('wc26-favs',JSON.stringify([...state.favs]))}
function initNav(){const html=routes.map(([id,label])=>`<button data-route="${id}">${label}</button>`).join(''); $('#sideNav').innerHTML=html; $('#bottomNav').innerHTML=html; $$('#sideNav button,#bottomNav button').forEach(b=>b.onclick=()=>setRoute(b.dataset.route));}
function applyTheme(){document.documentElement.dataset.theme=state.theme==='light'?'light':'dark'}
function render(){applyTheme(); const d=state.data||fallback; const matches=d.matches||[]; $('#clock').textContent=new Intl.DateTimeFormat('ru-RU',{dateStyle:'full',timeStyle:'short'}).format(new Date()); $('#source').innerHTML=state.loading?'<span class="loader"></span> Загрузка live-данных…':`${esc(d.provider||d.source||'API')} · ${fmtDate(d.lastUpdated,{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}`; $('#errorBox').innerHTML=state.error?`<div class="err">${esc(state.error)}</div>`:''; $$('#sideNav button,#bottomNav button').forEach(b=>b.classList.toggle('active',b.dataset.route===state.route)); const live=matches.filter(m=>m.status==='live').length, done=matches.filter(m=>m.status==='finished').length, upcoming=matches.filter(m=>m.status!=='finished').length; $('#statsCards').innerHTML=`<div class="stat glass"><b>${matches.length}</b><span>Матчей в базе</span></div><div class="stat glass"><b>${live}</b><span>Сейчас live</span></div><div class="stat glass"><b>${done}</b><span>Завершено</span></div>`; if(state.loading){$('#mainPanel').innerHTML='<h2>Загрузка</h2><div class="empty"><span class="loader"></span><br>Получаю данные из Worker…</div>'; $('#sidePanel').innerHTML='<h2>Игроки</h2><div class="empty">Скоро появится статистика</div>'; return} renderMain(d); renderSide(d)}
function renderMain(d){const m=d.matches||[]; if(state.route==='standings') return renderStandings(d); if(state.route==='stats') return renderStats(d); if(state.route==='favorites') return renderFavorites(d); if(state.route==='schedule') return renderSchedule(d,m); return renderHome(d,m)}
function renderHome(d,matches){const today=new Date().toDateString(); let list=matches.filter(m=>new Date(m.date).toDateString()===today); if(!list.length) list=matches.filter(m=>m.status==='live').concat(matches.filter(m=>m.status!=='finished').slice(0,5)); if(!list.length) list=matches.slice(0,6); $('#mainPanel').innerHTML=`<h2>Сегодня и ближайшие матчи</h2>${matchList(list)}`; bindMatches()}
function renderSchedule(d,matches){const dates=[...new Set(matches.map(m=>fmtDate(m.date,{day:'2-digit',month:'short'})))].slice(0,20); $('#mainPanel').innerHTML=`<h2>Расписание</h2><div class="toolbar">${dates.map(x=>`<button class="datechip">${esc(x)}</button>`).join('')}</div>`+Object.entries(groupByDate(matches)).map(([day,items])=>`<h3>${esc(day)}</h3>${matchList(items)}`).join(''); bindMatches()}
function matchList(items){if(!items.length)return '<div class="empty">Матчей пока нет</div>';return `<div class="match-list">${items.map(m=>`<button class="match" data-match="${esc(m.id)}"><div class="team">${flag(m.home)}<span class="team-name">${esc(m.home?.name||'Команда')}</span></div><div class="scorebox"><div class="score">${esc(score(m))}</div><div class="meta">${statusLabel(m)} · ${esc(m.group||'')}</div></div><div class="team away"><span class="team-name">${esc(m.away?.name||'Команда')}</span>${flag(m.away)}</div></button>`).join('')}</div>`}
function renderStandings(d){let groups=d.standings||[]; if(!groups.length){$('#mainPanel').innerHTML='<h2>Таблицы групп</h2><div class="empty">API пока не вернул таблицы. Они появятся после начала турнира.</div>';return} $('#mainPanel').innerHTML='<h2>Таблицы групп</h2>'+groups.map(g=>`<h3>${esc(g.group||g.name||'Группа')}</h3><div class="table-wrap"><table class="standings"><thead><tr><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>М</th><th>О</th></tr></thead><tbody>${(g.teams||g.rows||[]).map(t=>`<tr><td><span class="team">${flag(t.team||t)}<b>${esc(t.name||t.team?.name||'')}</b></span></td><td>${t.played||t.all?.played||0}</td><td>${t.win||t.all?.win||0}</td><td>${t.draw||t.all?.draw||0}</td><td>${t.lose||t.all?.lose||0}</td><td>${esc(t.goals||((t.all?.goals?.for||0)+':'+(t.all?.goals?.against||0)))}</td><td><b>${t.points||0}</b></td></tr>`).join('')}</tbody></table></div>`).join('')}
function renderStats(d){const goals=d.leaders?.goals||d.leaders?.scorers||[]; const assists=d.leaders?.assists||[]; $('#mainPanel').innerHTML=`<h2>Игроки</h2><h3>Голы</h3><div class="leaders">${players(goals,'голов')}</div><h3>Ассисты</h3><div class="leaders">${players(assists,'ассистов')}</div>`}
function players(list,label){if(!list.length)return '<div class="empty">Данных пока нет</div>';return list.slice(0,12).map(p=>`<div class="player">${avatar(p)}<div><b>${esc(p.name||p.player?.name)}</b><small>${flag({name:p.team,code:p.teamCode})} ${esc(p.team||p.statistics?.[0]?.team?.name||'')}</small></div><div class="value">${esc(p.value||p.goals||p.total||0)}</div></div>`).join('')}
function renderFavorites(d){const list=(d.matches||[]).filter(m=>state.favs.has(m.id)); $('#mainPanel').innerHTML='<h2>Избранное</h2>'+matchList(list); bindMatches()}
function renderSide(d){const upcoming=(d.matches||[]).filter(m=>m.status!=='finished').slice(0,4); $('#sidePanel').innerHTML=`<h2>Ближайшее</h2>${matchList(upcoming)}<hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><h2>Топ игроков</h2><div class="leaders">${players((d.leaders?.goals||[]).slice(0,5),'голов')}</div>`; bindMatches($('#sidePanel'))}
function bindMatches(root=document){$$('.match',root).forEach(b=>b.onclick=()=>openMatch(b.dataset.match))}
async function openMatch(id){let m=(state.data?.matches||[]).find(x=>x.id===id); state.activeMatch=m; $('#modal').classList.add('show'); $('#modalTitle').textContent=(m?.home?.name||'Матч')+' — '+(m?.away?.name||''); $('#modalContent').innerHTML='<div class="empty"><span class="loader"></span><br>Загрузка подробностей…</div>'; try{const res=await fetch(WORKER+'/api/match?id='+encodeURIComponent(id),{cache:'no-store'}); if(res.ok){const payload=await res.json(); if(payload.match)m=payload.match}}catch(e){} renderModal(m)}
function renderModal(m){if(!m){$('#modalContent').innerHTML='<div class="empty">Матч не найден</div>';return} $('#modalTitle').textContent=`${m.home?.name||''} — ${m.away?.name||''}`; const events=m.events||[]; const stats=m.stats||[]; const lineups=m.lineups||[]; $('#modalContent').innerHTML=`<div class="match" style="cursor:default"><div class="team">${flag(m.home)}<b>${esc(m.home?.name)}</b></div><div class="scorebox"><div class="score">${esc(score(m))}</div><div class="meta">${statusLabel(m)}</div></div><div class="team away"><b>${esc(m.away?.name)}</b>${flag(m.away)}</div></div><div class="split" style="margin-top:12px"><div class="mini-card"><h3>События</h3>${events.length?events.map(e=>`<p><b>${esc(e.time||e.minute||'')}</b> ${esc(e.type||'')} — ${esc(e.player?.name||e.player||'')}</p>`).join(''):'<p class="meta">Пока нет событий</p>'}</div><div class="mini-card"><h3>Статистика</h3>${stats.length?stats.map(s=>`<p>${esc(s.type||s.name)}: <b>${esc(s.home??s.value??'')}</b> / <b>${esc(s.away??'')}</b></p>`).join(''):'<p class="meta">Статистика появится во время матча</p>'}</div></div><div class="mini-card" style="margin-top:12px"><h3>Составы и оценки игроков</h3>${lineups.length?lineups.map(l=>`<p><b>${esc(l.team?.name||l.team||'')}</b></p>`).join(''):'<p class="meta">Данные составов появятся ближе к старту матча.</p>'}</div>`}
$('#closeModal').onclick=()=>$('#modal').classList.remove('show'); $('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')}; $('#refreshBtn').onclick=load; $('#themeBtn').onclick=()=>{state.theme=state.theme==='light'?'dark':'light';localStorage.setItem(STORE_THEME,state.theme);render()}; initNav(); clearOldCaches(); load(); setInterval(()=>$('#clock').textContent=new Intl.DateTimeFormat('ru-RU',{dateStyle:'full',timeStyle:'short'}).format(new Date()),30000); setInterval(load,5*60*1000);
})();
</script>
</body>
</html>
